name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ui:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          package_json_file: ui/package.json

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - run: pnpm run lint
      - run: pnpm run prettier:check
      - run: pnpm run build
      - run: pnpm run test

  server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v6

      # Testcontainers-based tests use the runner's Docker daemon.
      - run: ./gradlew build

  image:
    needs: [ui, server]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        component: [server, ui]
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        if: github.ref == 'refs/heads/main'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Swap ghcr.io/<owner> for the team registry when available.
      - uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.component }}
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/outpost-${{ matrix.component }}:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/outpost-${{ matrix.component }}:latest
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}
