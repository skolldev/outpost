# Default UI config: serves the Angular app under /outpost/ and proxies the
# API same-origin to the server. Shipped as an envsubst template
# (/etc/nginx/templates/default.conf.template) — the stock nginx entrypoint
# substitutes ${OUTPOST_API_URL} (e.g. http://outpost:8080) at container start.
# nginx runtime variables ($host, $uri, ...) are untouched because only
# variables present in the environment are substituted.
#
# Assumes the cluster ingress routes the /outpost prefix to this container
# WITHOUT stripping it. If the base href ever changes, the /outpost/ literals
# here and the /usr/share/nginx/html/outpost directory in the Dockerfile must
# change with it.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;

    # Path-only redirects: keeps scheme/host correct behind a TLS-terminating
    # ingress.
    absolute_redirect off;

    gzip on;
    gzip_vary on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # Liveness/readiness probe for this container.
    location = /nginx-healthz { return 200 "ok\n"; }

    # Convenience redirects into the app.
    location = /        { return 302 /outpost/; }
    location = /outpost { return 301 /outpost/; }

    # SSE live log tail — exact match wins over the API prefix location below.
    # Streaming must not be buffered; the server heartbeats every 25 s.
    location = /outpost/api/internal/logs {
        proxy_pass ${OUTPOST_API_URL}/api/internal/logs;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
    }

    # API proxy: /outpost/api/... -> /api/... — both trailing slashes are
    # load-bearing (proxy_pass replaces the matched prefix). ^~ stops the
    # asset regex below from hijacking API paths.
    location ^~ /outpost/api/ {
        proxy_pass ${OUTPOST_API_URL}/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 40m;  # sentry-cli chunk uploads (server caps at 34 MB)
    }

    # index.html references hashed bundles — always revalidate.
    location = /outpost/index.html {
        add_header Cache-Control "no-cache";
    }

    # Hashed build artifacts (outputHashing: all): cache forever. Deliberately
    # excludes unhashed public/ assets like favicon.ico.
    location ~* ^/outpost/.+\.(?:js|css|woff2?|ttf)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # SPA fallback for client-side routes.
    location /outpost/ {
        try_files $uri /outpost/index.html;
    }
}
